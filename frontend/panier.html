<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier | AgriMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="padding-top:70px;background:var(--bg-color);">

  <nav class="navbar-custom" id="main-navbar">
    <div class="container d-flex align-items-center gap-3" style="height:100%;">
      <a class="nav-brand" href="index.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--green)"><path d="M17 8C8 10 5.9 16.17 3.82 19.11A1 1 0 005 20.5C6.5 17 9 14.5 11 14c-1 2-2 4-1.5 6.5.5 2.5 3.5 2.5 4.5.5 2.5-5 1.5-11 3-12.5z"/></svg>
        AgriMarket
      </a>
      <div class="d-none d-md-flex align-items-center gap-1 ms-2">
        <a class="nav-link" href="index.html">Accueil</a>
        <a class="nav-link" href="produits.html">Catalogue</a>
      </div>
      <form class="nav-search d-none d-lg-flex ms-2" action="produits.html" method="get">
        <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" name="search" placeholder="Rechercher des produits...">
      </form>
      <div class="nav-actions ms-auto">
        <button id="theme-toggle" class="nav-btn" title="Thème"><i class="bi bi-moon"></i></button>
        <a href="panier.html" class="nav-btn" title="Panier" style="color:var(--green);">
          <i class="bi bi-cart3-fill" style="font-size:1.2rem;"></i>
          <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
        </a>
        <a href="auth.html" id="nav-auth-link" class="nav-btn d-none d-sm-flex" title="Connexion">
          <i class="bi bi-person" style="font-size:1.2rem;"></i>
        </a>
        <div class="dropdown" id="nav-user-menu" style="display:none;">
          <button class="nav-btn" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle" style="font-size:1.2rem;color:var(--green);"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow" style="border-radius:12px;min-width:180px;font-size:.88rem;">
            <li><a class="dropdown-item py-2" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Mon tableau de bord</a></li>
            <li><hr class="dropdown-divider my-1"></li>
            <li><a class="dropdown-item py-2 text-danger" href="#" id="btn-logout"><i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:28px 0 20px;">
    <div class="container">
      <h1 style="font-size:1.8rem;margin-bottom:4px;"><i class="bi bi-cart3 me-2" style="color:var(--primary);"></i>Mon Panier</h1>
    </div>
  </div>

  <div class="container py-5">
    <div class="row g-4 align-items-start">

      <!-- Articles -->
      <div class="col-lg-8">
        <div class="card-custom">
          <div class="card-body-custom">
            <div id="cart-empty" class="text-center py-5 d-none">
              <i class="bi bi-cart-x" style="font-size:3.5rem;color:var(--text-muted);"></i>
              <h4 class="mt-3" style="font-weight:700;">Votre panier est vide</h4>
              <p class="text-muted">Découvrez notre sélection de produits frais.</p>
              <a href="produits.html" class="btn-green mt-2" style="display:inline-flex;"><i class="bi bi-shop me-2"></i> Voir le catalogue</a>
            </div>
            <div id="cart-items"></div>
          </div>
        </div>
      </div>

      <!-- Résumé -->
      <div class="col-lg-4">
        <div class="card-custom sticky-top" style="top:88px;">
          <div class="card-body-custom">
            <h5 style="font-weight:700;margin-bottom:20px;">Résumé de commande</h5>

            <div class="d-flex justify-content-between mb-3" style="font-size:.9rem;">
              <span class="text-muted">Sous-total</span>
              <span id="cart-subtotal" class="fw-600">0 FCFA</span>
            </div>
            <div class="d-flex justify-content-between mb-3" style="font-size:.9rem;">
              <span class="text-muted">Livraison</span>
              <span style="color:var(--primary);font-weight:600;">Gratuite</span>
            </div>
            <hr style="border-color:var(--border);margin:16px 0;">
            <div class="d-flex justify-content-between mb-4">
              <span style="font-weight:700;font-size:1rem;">Total</span>
              <span id="cart-total" style="font-weight:800;font-size:1.3rem;color:var(--primary);">0 FCFA</span>
            </div>

            <button id="btn-checkout" class="btn-green w-100" style="justify-content:center;height:50px;font-size:.95rem;" disabled>
              <i class="bi bi-bag-check"></i> Commander
            </button>
            <div id="checkout-alert" class="mt-3 d-none" style="font-size:.85rem;border-radius:8px;padding:10px 14px;"></div>
            <p class="text-center mt-3 mb-0" style="font-size:.78rem;color:var(--text-muted);">
              <i class="bi bi-shield-check me-1" style="color:var(--primary);"></i> Paiement 100% sécurisé
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/pages/panier.js"></script>
</body>
</html>
